# Codemagic builds iOS from Capacitor — configure signing in the Codemagic UI first.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/

workflows:
  ios-testflight:
    name: Level Up Life — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.leveluplife.app
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        # Match App Store Connect integration name in Codemagic → Teams → Integrations
        APP_STORE_CONNECT_PUBLISHER: codemagic

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Typecheck
        script: npm run check

      - name: Build web bundle
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Generate iOS icons and splash
        script: npm run cap:assets

      - name: Set iOS build number
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  ios-simulator:
    name: Level Up Life — iOS Simulator (CI smoke)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App

    scripts:
      - name: Install and build web
        script: |
          npm ci
          npm run check
          npm run build
          npx cap sync ios

      - name: Compile for simulator
        script: |
          xcodebuild build \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGNING_ALLOWED=NO
