<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Return to Level Up Life</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      background: #0d1117; color: #e6edf3; padding: 1.5rem; text-align: center;
    }
    p { color: #c9d1d9; max-width: 22rem; line-height: 1.5; }
    a.btn {
      display: inline-block; margin-top: 1.25rem; border-radius: 10px;
      padding: 0.85rem 1.35rem; font-weight: 700; background: #e6edf3; color: #0d1117;
      text-decoration: none;
    }
    .err { color: #ff7b72; }
  </style>
</head>
<body>
  <main>
    <h1>Return to the app</h1>
    <p id="status">Opening Level Up Life…</p>
    <a id="open" class="btn" href="#">Open Level Up Life</a>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var statusEl = document.getElementById("status");
      var open = document.getElementById("open");
      if (!code) {
        statusEl.textContent = "Missing sign-in code. Close this window and try again in the app.";
        statusEl.className = "err";
        open.hidden = true;
        return;
      }
      var deep = "com.coenenmarket.leveluplife://google-auth?code=" + encodeURIComponent(code);
      open.href = deep;
      // Custom-scheme navigation works more reliably from a user gesture / plain page.
      window.location.replace(deep);
      setTimeout(function () {
        statusEl.textContent = "If the app didn’t open, tap the button below.";
      }, 700);
    })();
  </script>
</body>
</html>
